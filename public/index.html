<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Dev do Zero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        header {
            background-color: #1a1a2e;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 {
            font-size: 24px;
        }
        .logo p {
            font-size: 14px;
            color: #ccc;
        }
        .carrinho-btn {
            background-color: #4a69bd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            position: relative;
            font-size: 16px;
        }
        .carrinho-contador {
            position: absolute;
            top: -8px;
            right: -8px;
            background-color: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #produtos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }
        .produto {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s;
        }
        .produto:hover {
            transform: translateY(-5px);
        }
        .produto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .produto-info {
            padding: 15px;
        }
        .produto h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }
        .produto p {
            font-size: 20px;
            color: #4a69bd;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .produto button {
            width: 100%;
            padding: 10px;
            background-color: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: not-allowed;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            font-size: 18px;
            color: #666;
            padding: 50px;
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            #produtos-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>🛒 Loja Dev do Zero</h1>
            <p>Sua primeira loja com Node.js</p>
        </div>
        <button class="carrinho-btn">
            Carrinho
            <span class="carrinho-contador">0</span>
        </button>
    </header>

    <main>
        <div id="produtos-container">
            <div class="loading">Carregando produtos...</div>
        </div>
    </main>

    <script>
        async function carregarProdutos() {
            try {
                const resposta = await fetch('/api/produtos');
                const produtos = await resposta.json();
                
                const container = document.getElementById('produtos-container');
                container.innerHTML = '';

                if (produtos.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhum produto cadastrado ainda.</div>';
                    return;
                }

                produtos.forEach(produto => {
                    container.innerHTML += `
                        <div class="produto">
                            <img src="${produto.img}" alt="${produto.nome}">
                            <div class="produto-info">
                                <h3>${produto.nome}</h3>
                                <p>R$ ${produto.preco}</p>
                                <button>Comprar - Em breve</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Erro ao carregar produtos:', error);
                document.getElementById('produtos-container').innerHTML = 
                    '<div class="loading">Erro ao carregar produtos. Tenta atualizar a página.</div>';
            }
        }

        carregarProdutos();
    </script>
</body>
</html>
