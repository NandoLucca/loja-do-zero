<<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Dev do Zero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f1f5f9; color: #1e293b; }
    header { background: #0f172a; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
    header h1 { font-size: 24px; }
    .carrinho-btn { background: #3b82f6; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; position: relative; }
    .carrinho-btn:hover { background: #2563eb; }
    .badge { background: #ef4444; border-radius: 50%; padding: 2px 8px; font-size: 12px; position: absolute; top: -8px; right: -8px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }
    .produto { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
    .produto:hover { transform: translateY(-4px); }
    .produto img { width: 100%; height: 260px; object-fit: cover; }
    .produto-info { padding: 16px; }
    .produto-info h3 { font-size: 18px; margin-bottom: 8px; }
    .preco { color: #059669; font-size: 22px; font-weight: bold; margin: 12px 0; }
    .btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn:hover { background: #2563eb; }
    
    /* Modal do Carrinho */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 20; }
    .modal-ativo { display: flex; align-items: center; justify-content: center; }
    .modal-content { background: white; border-radius: 12px; padding: 24px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .fechar { background: none; border: none; font-size: 28px; cursor: pointer; }
    .item-carrinho { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #e5e7eb; }
    .item-info h4 { margin-bottom: 4px; }
    .item-acoes { display: flex; gap: 8px; align-items: center; }
    .item-acoes button { width: 28px; height: 28px; border: 1px solid #d1d5db; background: white; border-radius: 4px; cursor: pointer; }
    .total { font-size: 24px; font-weight: bold; text-align: right; margin-top: 20px; color: #059669; }
    .btn-finalizar { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 8px; font-size: 18px; margin-top: 16px; cursor: pointer; }
    .btn-finalizar:hover { background: #059669; }
    .vazio { text-align: center; padding: 40px; color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>🛒 Loja Dev do Zero</h1>
      <p>Sua primeira loja com Node.js</p>
    </div>
    <button class="carrinho-btn" onclick="abrirCarrinho()">
      Carrinho <span class="badge" id="badge">0</span>
    </button>
  </header>
  
  <main class="container">
    <div class="grid" id="lista-produtos"></div>
  </main>

  <!-- Modal Carrinho -->
  <div class="modal" id="modal-carrinho">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Seu Carrinho</h2>
        <button class="fechar" onclick="fecharCarrinho()">&times;</button>
      </div>
      <div id="itens-carrinho"></div>
      <div class="total" id="total">Total: R$ 0,00</div>
      <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
    </div>
  </div>

  <script>
    let produtos = [];
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

    // Busca produtos da API
    fetch('/api/produtos')
      .then(res => res.json())
      .then(data => {
        produtos = data;
        renderizarProdutos();
        atualizarBadge();
      });

    function renderizarProdutos() {
      const lista = document.getElementById('lista-produtos');
      lista.innerHTML = produtos.map(p => `
        <div class="produto">
          <img src="${p.img}" alt="${p.nome}">
          <div class="produto-info">
            <h3>${p.nome}</h3>
            <div class="preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
            <button class="btn" onclick="addCarrinho(${p.id})">Adicionar ao Carrinho</button>
          </div>
        </div>
      `).join('');
    }

    function addCarrinho(id) {
      const produto = produtos.find(p => p.id === id);
      const itemExistente = carrinho.find(item => item.id === id);
      
      if (itemExistente) {
        itemExistente.qtd++;
      } else {
        carrinho.push({ ...produto, qtd: 1 });
      }
      
      salvarCarrinho();
      atualizarBadge();
    }

    function alterarQtd(id, delta) {
      const item = carrinho.find(item => item.id === id);
      if (!item) return;
      
      item.qtd += delta;
      if (item.qtd <= 0) {
        carrinho = carrinho.filter(item => item.id !== id);
      }
      
      salvarCarrinho();
      renderizarCarrinho();
      atualizarBadge();
    }

    function salvarCarrinho() {
      localStorage.setItem('carrinho', JSON.stringify(carrinho));
    }

    function atualizarBadge() {
      const total = carrinho.reduce((sum, item) => sum + item.qtd, 0);
      document.getElementById('badge').textContent = total;
    }

    function abrirCarrinho() {
      document.getElementById('modal-carrinho').classList.add('modal-ativo');
      renderizarCarrinho();
    }

    function fecharCarrinho() {
      document.getElementById('modal-carrinho').classList.remove('modal-ativo');
    }

    function renderizarCarrinho() {
      const div = document.getElementById('itens-carrinho');
      
      if (carrinho.length === 0) {
        div.innerHTML = '<div class="vazio">Carrinho vazio 😢</div>';
        document.getElementById('total').textContent = 'Total: R$ 0,00';
        return;
      }

      div.innerHTML = carrinho.map(item => `
        <div class="item-carrinho">
          <div class="item-info">
            <h4>${item.nome}</h4>
            <p>R$ ${item.preco.toFixed(2).replace('.', ',')}</p>
          </div>
          <div class="item-acoes">
            <button onclick="alterarQtd(${item.id}, -1)">-</button>
            <span>${item.qtd}</span>
            <button onclick="alterarQtd(${item.id}, 1)">+</button>
          </div>
        </div>
      `).join('');

      const total = carrinho.reduce((sum, item) => sum + (item.preco * item.qtd), 0);
      document.getElementById('total').textContent = `Total: R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    function finalizarCompra() {
      if (carrinho.length === 0) {
        alert('Carrinho vazio!');
        return;
      }
      alert('Compra finalizada! Em breve: integração com pagamento 💳');
      carrinho = [];
      salvarCarrinho();
      atualizarBadge();
      fecharCarrinho();
    }
  </script>
</body>
</html>
